<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Migrate Product Images — Zahroun Admin</title>
<style>
  body { font-family: monospace; padding: 2rem; background: #0d1117; color: #e6edf3; max-width: 800px; margin: 0 auto; }
  h1 { color: #58a6ff; font-size: 1.2rem; }
  .warning { background: #3d1a00; border: 1px solid #d29922; border-radius: 6px; padding: 1rem; margin: 1rem 0; color: #e3b341; font-size: .85rem; }
  button { background: #238636; color: #fff; border: none; padding: .75rem 1.5rem; border-radius: 6px; cursor: pointer; font-size: .95rem; font-weight: 600; }
  button:disabled { background: #333; color: #666; cursor: not-allowed; }
  #log { background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 1rem; margin-top: 1.5rem; min-height: 300px; max-height: 600px; overflow-y: auto; font-size: .8rem; line-height: 1.6; white-space: pre-wrap; }
  .ok   { color: #3fb950; }
  .skip { color: #8b949e; }
  .err  { color: #f85149; }
  .info { color: #58a6ff; }
  #status { margin-top: 1rem; font-size: .9rem; font-weight: 600; }
</style>
</head>
<body>
<h1>Product Image Migration — Cloudinary</h1>
<div class="warning">
  ⚠ One-time admin tool. Run this once to update Firestore product records with Cloudinary URLs.
  Must be logged in as admin. Delete this file after use.
</div>
<button id="btn">Run Migration</button>
<div id="status"></div>
<div id="log">Ready. Click "Run Migration" to start.\n</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, getDocs, doc, updateDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA8D5-muT5d_kFekNU1lSSYtgZGJI5_OZA",
  authDomain: "zahroun.firebaseapp.com",
  projectId: "zahroun",
  storageBucket: "zahroun.firebasestorage.app",
  messagingSenderId: "923370845185",
  appId: "1:923370845185:web:6fd1c3f3c1e235b255bc00"
};

const app  = initializeApp(firebaseConfig, "migrator");
const auth = getAuth(app);
const db   = getFirestore(app);

// ── Cloudinary URL map — matches js/products.js exactly ─────────────────────
const CDN = "https://res.cloudinary.com/dj3nmxfj0/image/upload/zahroun/products";

const PRODUCT_IMAGES = {
  1: {
    image: CDN + "/sahraa-oudh-50ml.png",
    sizeImages: { "6ML": CDN+"/common-men-6ml.png", "15ML": CDN+"/common-men-15ml.png", "30ML": CDN+"/sahraa-oudh-30ml.png", "50ML": CDN+"/sahraa-oudh-50ml.png" }
  },
  2: {
    image: CDN + "/dulce-oud-50ml.png",
    sizeImages: { "6ML": CDN+"/common-men-6ml.png", "15ML": CDN+"/common-men-15ml.png", "30ML": CDN+"/dulce-oud-30ml.png", "50ML": CDN+"/dulce-oud-50ml.png" }
  },
  3: {
    image: CDN + "/rosy-diva-50ml.png",
    sizeImages: { "6ML": CDN+"/common-women-6ml.png", "15ML": CDN+"/common-women-15ml.png", "30ML": CDN+"/rosy-diva-30ml.png", "50ML": CDN+"/rosy-diva-50ml.png" }
  },
  4: {
    image: CDN + "/common-premium-50ml.png",
    sizeImages: { "6ML": CDN+"/common-men-6ml.png", "15ML": CDN+"/common-men-15ml.png", "30ML": CDN+"/alpha-core-30ml.png", "50ML": CDN+"/common-premium-50ml.png" }
  },
  5: {
    image: CDN + "/al-khayran-50ml.png",
    sizeImages: { "6ML": CDN+"/common-men-6ml.png", "15ML": CDN+"/common-men-15ml.png", "30ML": CDN+"/al-khayran-30ml.png", "50ML": CDN+"/al-khayran-50ml.png" }
  },
  6: {
    image: CDN + "/chivas-50ml.png",
    sizeImages: { "6ML": CDN+"/common-men-6ml.png", "15ML": CDN+"/common-men-15ml.png", "30ML": CDN+"/chivas-30ml.jpg", "50ML": CDN+"/chivas-50ml.png" }
  },
  7: {
    image: CDN + "/common-premium-50ml.png",
    sizeImages: { "6ML": CDN+"/common-men-6ml.png", "15ML": CDN+"/common-men-15ml.png", "30ML": CDN+"/solvane-30ml.png", "50ML": CDN+"/common-premium-50ml.png" }
  },
  8: {
    image: CDN + "/pink-sapphire-50ml.png",
    sizeImages: { "6ML": CDN+"/common-women-6ml.png", "15ML": CDN+"/common-women-15ml.png", "30ML": CDN+"/pink-sapphire-30ml.png", "50ML": CDN+"/pink-sapphire-50ml.png" }
  },
  9: {
    image: CDN + "/elifra-50ml.png",
    sizeImages: { "6ML": CDN+"/common-women-6ml.png", "15ML": CDN+"/common-women-15ml.png", "30ML": CDN+"/elifra-30ml.png", "50ML": CDN+"/elifra-50ml.png" }
  },
  10: {
    image: CDN + "/common-premium-50ml.png",
    sizeImages: { "6ML": CDN+"/common-women-6ml.png", "15ML": CDN+"/common-women-15ml.png", "30ML": CDN+"/piyora-30ml.png", "50ML": CDN+"/common-premium-50ml.png" }
  },
  11: {
    image: CDN + "/bellavie-50ml.png",
    sizeImages: { "6ML": CDN+"/common-women-6ml.png", "15ML": CDN+"/common-women-15ml.png", "30ML": CDN+"/bellavie-30ml.png", "50ML": CDN+"/bellavie-50ml.png" }
  }
};

const logEl    = document.getElementById("log");
const statusEl = document.getElementById("status");
const btn      = document.getElementById("btn");

function log(msg, cls = "") {
  const line = document.createElement("span");
  if (cls) line.className = cls;
  line.textContent = msg + "\n";
  logEl.appendChild(line);
  logEl.scrollTop = logEl.scrollHeight;
}

onAuthStateChanged(auth, user => {
  if (user) {
    statusEl.textContent = `Logged in as: ${user.email}`;
    statusEl.style.color = "#3fb950";
  } else {
    statusEl.textContent = "⚠ Not logged in — open admin.html first to sign in, then return here.";
    statusEl.style.color = "#f85149";
    btn.disabled = true;
  }
});

btn.addEventListener("click", async () => {
  btn.disabled = true;
  btn.textContent = "Running…";
  logEl.textContent = "";

  try {
    log("Fetching products collection from Firestore…", "info");
    const snap = await getDocs(collection(db, "products"));

    if (snap.empty) {
      log("\nFirestore products collection is empty.", "skip");
      log("Seed data (products.js) is already updated with Cloudinary URLs.", "skip");
      log("No Firestore records need updating.\n", "skip");
      log("✓ Migration complete.", "ok");
      btn.textContent = "Done";
      return;
    }

    log(`Found ${snap.size} product(s) in Firestore.\n`, "info");
    let updated = 0, skipped = 0, errors = 0;

    for (const docSnap of snap.docs) {
      const rawId = docSnap.id;
      const numId = Number(rawId);
      const data  = docSnap.data();
      const name  = data.name || rawId;
      const imgs  = PRODUCT_IMAGES[numId];

      if (!imgs) {
        log(`  SKIP  id=${rawId} "${name}" — no mapping (new product, update manually)`, "skip");
        skipped++;
        continue;
      }

      // Check sizeImages — not image. The image field already has admin-uploaded
      // Cloudinary URLs and must NOT be overwritten. Only sizeImages need fixing.
      const si = data.sizeImages || {};
      const hasLocalSizeImage = Object.values(si).some(v => v && !v.startsWith("https://"));
      if (!hasLocalSizeImage) {
        log(`  SKIP  id=${rawId} "${name}" — sizeImages already remote`, "skip");
        skipped++;
        continue;
      }

      try {
        // Only update sizeImages. Preserve existing image (admin-uploaded Cloudinary photo).
        await updateDoc(doc(db, "products", rawId), {
          sizeImages: imgs.sizeImages
        });
        log(`  ✓     id=${rawId} "${name}" — sizeImages updated (image preserved)`, "ok");
        updated++;
      } catch (e) {
        log(`  ✗     id=${rawId} "${name}" — ${e.message}`, "err");
        errors++;
      }
    }

    log(`\n─────────────────────────────────────────`, "info");
    log(`Updated:  ${updated}`, "ok");
    log(`Skipped:  ${skipped}`, "skip");
    log(`Errors:   ${errors}`, errors ? "err" : "skip");
    log(`\n✓ Done. All product images now point to Cloudinary.\n`, "ok");
    log(`You can delete this file (migrate-firestore.html) now.`, "skip");

  } catch (e) {
    log(`\nFatal error: ${e.message}`, "err");
    console.error(e);
  }

  btn.textContent = "Done";
});
</script>
</body>
</html>
