<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="color-scheme" content="only light">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Account | Zahroun</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/analytics.js"></script>
    <script type="module" src="js/auth.js"></script>
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <style>
        .account-head { background-color: var(--accent-color); padding: 3rem 0; text-align: center; }
        .order-card { background: var(--surface-color); border: 1px solid var(--border-color); border-radius: 12px;
            padding: 1.5rem; margin-bottom: 1.25rem; }
        .order-card .top { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;
            gap: .5rem; border-bottom: 1px solid var(--border-color); padding-bottom: .9rem; margin-bottom: .9rem; }
        .order-card .oid { font-family: var(--font-sans, sans-serif); color: var(--primary-color); font-weight: 600; letter-spacing: .04em; }
        .o-status { font-size: .75rem; padding: .25rem .7rem; border-radius: 20px; text-transform: capitalize; background: var(--accent-color); }
        .o-status.delivered { background: #e6f4ea; color: #1e7e34; }
        .o-status.cancelled { background: #fdecea; color: #9b2226; }
        .o-status.confirmed, .o-status.shipped { background: #e8f0fe; color: #1a56b8; }
        .o-item { display: flex; gap: 1rem; align-items: center; margin-bottom: .6rem; }
        .o-item img { width: 48px; height: 48px; object-fit: contain; background: var(--bg-color); border-radius: 6px; }
        .login-cta { text-align: center; padding: 4rem 1rem; }
    </style>
</head>
<body>
    <header class="header">
        <div class="container nav-container">
            <a href="index.html" class="logo"><img src="product pictures/main logo.png" alt="Zahroun"></a>
            <nav class="nav-links" id="nav-links">
                <a href="index.html">Home</a>
                <a href="shop.html">Shop</a>
                <a href="about.html">About Us</a>
                <a href="contact.html">Contact</a>
            </nav>
            <div class="nav-icons">
                <button aria-label="Search" onclick="window.location.href='shop.html'"><ion-icon name="search-outline"></ion-icon></button>
                <button aria-label="Cart" id="cart-icon"><ion-icon name="bag-outline"></ion-icon><span class="cart-count" id="cart-count">0</span></button>
                <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="Menu"><ion-icon name="menu-outline"></ion-icon></button>
            </div>
        </div>
    </header>

    <div class="account-head">
        <div class="container">
            <h1>My Account</h1>
            <p id="account-greeting" style="color: var(--text-muted);">Your orders and details</p>
        </div>
    </div>

    <div class="container py-8" style="max-width: 820px; margin-top: 60px;">
        <div id="account-content">
            <p class="muted-note" style="text-align:center; padding:3rem; color:var(--text-muted);">Loading…</p>
        </div>
    </div>

    <!-- Cart Modal -->
    <div id="cart-modal" style="display: none; position: fixed; top: 0; right: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000;">
        <div style="position: absolute; top: 0; right: 0; width: 400px; max-width: 100%; height: 100%; background: white; padding: 2rem; display: flex; flex-direction: column; box-shadow: -5px 0 15px rgba(0,0,0,0.1); transform: translateX(100%); transition: transform 0.3s;" id="cart-content-wrapper">
            <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); padding-bottom: 1rem; margin-bottom: 1rem;">
                <h3>Your Cart</h3>
                <button id="close-cart" style="background: none; border: none; font-size: 1.5rem; cursor: pointer;"><ion-icon name="close-outline"></ion-icon></button>
            </div>
            <div id="cart-items" style="flex: 1; overflow-y: auto;"></div>
            <div style="border-top: 1px solid var(--border-color); padding-top: 1rem; margin-top: 1rem;">
                <div style="display: flex; justify-content: space-between; margin-bottom: 1rem; font-weight: 600; font-size: 1.2rem;"><span>Total</span><span id="cart-total">0 BDT</span></div>
                <button class="btn" style="width: 100%;" onclick="window.location.href='checkout.html'">Checkout</button>
            </div>
        </div>
    </div>

    <script type="module" src="js/store.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/ui.js"></script>
    <script type="module">
        import { db, auth } from "./js/firebase-config.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const content = document.getElementById("account-content");
        const esc = (s) => String(s ?? "").replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
        const fmtDate = (ts) => { try { return ts?.toDate ? ts.toDate().toLocaleDateString("en-GB", { day: "2-digit", month: "short", year: "numeric" }) : ""; } catch { return ""; } };

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                content.innerHTML = `<div class="login-cta">
                    <ion-icon name="person-circle-outline" style="font-size:3rem;color:var(--primary-color);"></ion-icon>
                    <h3 style="margin:1rem 0;">Please log in to view your account</h3>
                    <button class="btn" id="acc-login">Log in</button></div>`;
                document.getElementById("acc-login").onclick = () => window.zahrounAuth && window.zahrounAuth.openModal();
                return;
            }
            document.getElementById("account-greeting").textContent = `Hello, ${user.displayName || user.email}`;
            try {
                const snap = await getDocs(query(collection(db, "orders"), where("uid", "==", user.uid)));
                const orders = snap.docs.map(d => ({ id: d.id, ...d.data() }))
                    .sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));

                if (!orders.length) {
                    content.innerHTML = `<div class="login-cta">
                        <ion-icon name="bag-outline" style="font-size:3rem;color:var(--text-muted);"></ion-icon>
                        <h3 style="margin:1rem 0;">No orders yet</h3>
                        <a href="shop.html" class="btn">Start Shopping</a></div>`;
                    return;
                }
                content.innerHTML = `<h2 style="margin-bottom:1.5rem;">Order History</h2>` + orders.map(o => `
                    <div class="order-card">
                        <div class="top">
                            <div><span class="oid">${o.orderNum ? "#" + o.orderNum : "#" + o.id.slice(0,6).toUpperCase()}</span> <span class="muted-note" style="color:var(--text-muted);">· ${fmtDate(o.createdAt)}</span></div>
                            <span class="o-status ${esc(o.status)}">${esc(o.status || "pending")}</span>
                        </div>
                        ${(o.items || []).map(i => `
                            <div class="o-item">
                                <img src="${esc(i.image)}" alt="">
                                <div style="flex:1;"><strong style="font-size:.95rem;">${esc(i.name)}</strong><br>
                                <span class="muted-note" style="color:var(--text-muted);font-size:.82rem;">${esc(i.size)} · Qty ${i.quantity}</span></div>
                                <div>৳${i.price * i.quantity}</div>
                            </div>`).join("")}
                        <div style="display:flex;justify-content:space-between;border-top:1px solid var(--border-color);padding-top:.8rem;margin-top:.6rem;">
                            <span class="muted-note" style="color:var(--text-muted);">${esc(o.payment?.method || "")} · ${esc(o.customer?.area || "")}</span>
                            <strong>Total: ৳${o.total}</strong>
                        </div>
                    </div>`).join("");
            } catch (e) {
                content.innerHTML = `<p style="color:#9b2226;text-align:center;padding:2rem;">Could not load orders: ${esc(e.code || e.message)}</p>`;
            }
        });
    </script>
</body>
</html>
