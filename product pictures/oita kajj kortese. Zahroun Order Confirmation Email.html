reen and (max-width: 640px) {\n      .email-outer  { padding: 0 !important; }\n      .email-wrap   { width: 100% !important; border-radius: 0 !important; }\n      .main-title   { font-size: 32px !important; }\n      .total-val    { font-size: 30px !important; }\n      .hpad         { padding-left: 16px !important; padding-right: 16px !important; }\n      .col-l, .col-r { display: block !important; width: 100% !important; }\n      .col-sep      { display: none !important; }\n      .item-img     { width: 64px !important; height: 64px !important; }\n    }\n  <\u002Fstyle>\n<\u002Fhead>\n\n<!-- ═══════════════════════════════════════════════════════════════════\n     ZAHROUN — Order Confirmation Email Template\n     ───────────────────────────────────────────────────────────────────\n     EmailJS Template Variables:\n       {{to_name}}        Customer name\n       {{order_id}}       8-char uppercase order ID  (e.g. NLD9P7MX)\n       {{order_date}}     Formatted date  (e.g. 05 June 2026, 11:44 PM)\n       {{items_html}}     Product <tr> rows — generated by sendInvoiceEmail()\n       {{subtotal}}       e.g. 7,390.00\n       {{delivery}}       e.g. 0.00\n       {{discount_html}}  Discount <tr> rows (loyalty pts / coupon)\n       {{total}}          Grand total  e.g. 7,310.00\n       {{payment_method}} e.g. Cash on Delivery\n       {{address}}        Customer delivery address\n       {{mobile}}         Customer mobile number\n     ═══════════════════════════════════════════════════════════════════ -->\n\n<body style=\"margin:0;padding:0;background-color:#020202;font-family:'Inter',Arial,Helvetica,sans-serif;\">\n\n<!-- ─── OUTER WRAPPER ─────────────────────────────────────────────── -->\n<table class=\"email-outer\" width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"background-color:#020202;padding:32px 0;\">\n  <tbody><tr>\n    <td align=\"center\">\n\n      <!-- ┌──────────────────────────────────────────────────────────┐ -->\n      <!-- │                  600 px EMAIL CONTAINER                   │ -->\n      <!-- └──────────────────────────────────────────────────────────┘ -->\n      <table class=\"email-wrap\" width=\"600\" cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"width:600px;max-width:600px;\n                    background:linear-gradient(168deg,#031511 0%,#061E17 45%,#0A2B22 100%);\n                    border-radius:20px;overflow:hidden;\n                    box-shadow:0 28px 72px rgba(0,0,0,0.72);\">\n\n\n        <!-- ══════════════════════════════════════════════════════════\n             § 1  HEADER — Logo + tagline\n        ══════════════════════════════════════════════════════════ -->\n        <tbody><tr>\n          <td style=\"background:linear-gradient(180deg,#010101 0%,#031410 100%);\n                     padding:34px 40px 26px;text-align:center;\n                     border-bottom:1px solid rgba(212,166,74,0.18);\">\n\n            <!-- Brand logo image -->\n            <img src=\"3e37d7c1-53b9-4dfb-b4d8-1f5d784d9e32\" width=\"192\" alt=\"ZAHROUN\" style=\"width:192px;max-width:192px;display:block;margin:0 auto 12px;\">\n\n            <!-- Tagline -->\n            <div style=\"font-family:'Inter',Arial,sans-serif;font-size:9px;font-weight:700;\n                        color:#D4A64A;letter-spacing:7px;text-transform:uppercase;\">\n              LUXURY FRAGRANCES\n            <\u002Fdiv>\n\n            <!-- Thin gold rule -->\n            <div style=\"width:76px;height:1px;\n                        background:linear-gradient(90deg,transparent,rgba(212,166,74,0.55),transparent);\n                        margin:18px auto 0;\"><\u002Fdiv>\n          <\u002Ftd>\n        <\u002Ftr>\n\n\n        <!-- ══════════════════════════════════════════════════════════\n             § 2  HERO — Checkmark + title + subtitle\n        ══════════════════════════════════════════════════════════ -->\n        <tr>\n          <td style=\"padding:46px 40px 22px;text-align:center;\">\n\n            <!-- Gold ring
