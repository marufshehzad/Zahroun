<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="color-scheme" content="only light">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | Zahroun</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/analytics.js"></script>
    <script type="module" src="js/auth.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <style>
        .checkout-container {
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 4rem;
            margin: 4rem auto;
        }
        .checkout-section {
            background: var(--surface-color);
            padding: 2.5rem;
            border-radius: 8px;
            box-shadow: var(--shadow-sm);
        }
        .checkout-section h2 {
            font-family: var(--font-serif);
            font-size: 1.8rem;
            margin-bottom: 1.5rem;
            color: var(--text-main);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.5rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--text-main);
        }
        .form-control {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-family: var(--font-sans);
            font-size: 1rem;
            background: var(--bg-color);
        }
        .form-control:focus {
            outline: none;
            border-color: var(--primary-color);
        }
        .payment-methods {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .payment-option {
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 1rem;
            cursor: pointer;
            transition: var(--transition);
        }
        .payment-option:hover {
            border-color: var(--primary-color);
        }
        .payment-option input[type="radio"] {
            margin-right: 0.5rem;
        }
        .payment-details {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px dashed var(--border-color);
            display: none;
        }
        .order-summary-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border-color);
        }
        .order-total {
            display: flex;
            justify-content: space-between;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-main);
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 2px solid var(--text-main);
        }
        @media (max-width: 768px) {
            .checkout-container {
                grid-template-columns: 1fr;
                gap: 1.25rem;
                margin: 1.25rem auto !important;
            }
            .checkout-section { padding: 1.25rem !important; }
            .checkout-section h2 { font-size: 1.3rem; }
        }
        .coupon-row {
            display: flex;
            gap: .5rem;
            align-items: stretch;
        }
        .coupon-row input {
            flex: 1;
            min-width: 0;
            text-transform: uppercase;
            font-size: .9rem;
            padding: .6rem .8rem;
        }
        .coupon-row .coupon-btn {
            flex-shrink: 0;
            padding: .6rem 1.1rem;
            font-size: .85rem;
            white-space: nowrap;
            line-height: 1;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container nav-container">
            <a href="index.html" class="logo"><img src="product pictures/main logo.png" alt="Zahroun"></a>
            <nav class="nav-links" id="nav-links">
                <a href="index.html">Home</a>
                <a href="shop.html">Shop</a>
                <a href="about.html">About Us</a>
                <a href="contact.html">Contact</a>
            </nav>
            <div class="nav-icons">
                <button aria-label="Search" onclick="window.location.href='shop.html'"><ion-icon name="search-outline"></ion-icon></button>
                <button aria-label="Cart" id="cart-icon">
                    <ion-icon name="bag-outline"></ion-icon>
                    <span class="cart-count" id="cart-count">0</span>
                </button>
                <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="Menu">
                    <ion-icon name="menu-outline"></ion-icon>
                </button>
            </div>
        </div>
    </header>

    <div class="container">
        <form id="checkout-form" class="checkout-container">
            <!-- Left Column: Shipping & Payment -->
            <div>
                <div class="checkout-section" style="margin-bottom: 2rem;">
                    <h2>Shipping Details</h2>
                    <div class="form-group">
                        <label for="fullName">Full Name *</label>
                        <input type="text" id="fullName" class="form-control" required placeholder="John Doe">
                    </div>
                    <div class="form-group">
                        <label for="mobile">Mobile Number *</label>
                        <input type="tel" id="mobile" class="form-control" required placeholder="01XXXXXXXXX">
                    </div>
                    <div class="form-group">
                        <label for="address">Full Delivery Address *</label>
                        <textarea id="address" class="form-control" rows="3" required placeholder="House, Road, Block, Area..."></textarea>
                    </div>
                    <div class="form-group">
                        <label for="deliveryArea">Delivery Area *</label>
                        <select id="deliveryArea" class="form-control" required onchange="calculateTotal()">
                            <option value="70">Inside Dhaka (70 BDT)</option>
                            <option value="130">Outside Dhaka (130 BDT)</option>
                        </select>
                    </div>
                </div>

                <div class="checkout-section">
                    <h2>Payment Method</h2>
                    <div class="payment-methods">
                        <label class="payment-option">
                            <input type="radio" name="payment" value="bKash" onchange="togglePaymentDetails()"> bKash (Manual)
                            <div class="payment-details" id="bkash-details">
                                <p style="margin-bottom: 0.5rem; color: var(--text-muted);">Please send money to our bKash Number: <strong>01886936581</strong> (Personal)</p>
                                <input type="text" id="bkashTxn" class="form-control" placeholder="Enter Transaction ID">
                            </div>
                        </label>
                        <label class="payment-option">
                            <input type="radio" name="payment" value="Nagad" onchange="togglePaymentDetails()"> Nagad (Manual)
                            <div class="payment-details" id="nagad-details">
                                <p style="margin-bottom: 0.5rem; color: var(--text-muted);">Please send money to our Nagad Number: <strong>01886936581</strong> (Personal)</p>
                                <input type="text" id="nagadTxn" class="form-control" placeholder="Enter Transaction ID">
                            </div>
                        </label>
                        <label class="payment-option">
                            <input type="radio" name="payment" value="COD" checked onchange="togglePaymentDetails()"> Cash on Delivery
                        </label>
                    </div>
                </div>
            </div>

            <!-- Right Column: Order Summary -->
            <div>
                <div class="checkout-section">
                    <h2>Order Summary</h2>
                    <div id="checkout-cart-items">
                        <!-- Populated by JS -->
                    </div>
                    
                    <div style="margin-top: 1.5rem;">
                        <!-- Coupon Code Input -->
                        <div style="margin-bottom:1rem;">
                            <div class="coupon-row">
                                <input type="text" id="coupon-code-input" class="form-control" placeholder="Coupon code">
                                <button type="button" id="apply-coupon-btn" class="btn coupon-btn">Apply</button>
                            </div>
                            <div id="coupon-feedback" style="font-size:.82rem;margin-top:.4rem;min-height:1.1em;"></div>
                        </div>

                        <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem; color: var(--text-muted);">
                            <span>Subtotal</span>
                            <span id="summary-subtotal">0 BDT</span>
                        </div>
                        <div id="discount-row" style="display:none;justify-content:space-between;margin-bottom:.5rem;color:#1e7e34;">
                            <span id="discount-label">Discount</span>
                            <span id="summary-discount">-৳0</span>
                        </div>
                        <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem; color: var(--text-muted);">
                            <span>Delivery Charge</span>
                            <span id="summary-delivery">70 BDT</span>
                        </div>
                        <div class="order-total">
                            <span>Total</span>
                            <span id="summary-total">0 BDT</span>
                        </div>
                    </div>

                    <button type="submit" class="btn" style="width: 100%; margin-top: 2rem; font-size: 1.2rem; padding: 1rem;">Place Order</button>
                </div>
            </div>
        </form>
    </div>

    <!-- Reusing Cart Modal Structure -->
    <div id="cart-modal" style="display: none; position: fixed; top: 0; right: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000;">
        <div style="position: absolute; top: 0; right: 0; width: 400px; max-width: 100%; height: 100%; background: white; padding: 2rem; display: flex; flex-direction: column; box-shadow: -5px 0 15px rgba(0,0,0,0.1); transform: translateX(100%); transition: transform 0.3s;" id="cart-content-wrapper">
            <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); padding-bottom: 1rem; margin-bottom: 1rem;">
                <h3>Your Cart</h3>
                <button id="close-cart" style="background: none; border: none; font-size: 1.5rem; cursor: pointer;"><ion-icon name="close-outline"></ion-icon></button>
            </div>
            <div id="cart-items" style="flex: 1; overflow-y: auto;"></div>
            <div style="border-top: 1px solid var(--border-color); padding-top: 1rem; margin-top: 1rem;">
                <div style="display: flex; justify-content: space-between; margin-bottom: 1rem; font-weight: 600; font-size: 1.2rem;">
                    <span>Total</span>
                    <span id="cart-total">0 BDT</span>
                </div>
                <button class="btn checkout-redirect-btn" style="width: 100%;">Checkout</button>
            </div>
        </div>
    </div>

    <script type="module" src="js/store.js"></script>
    <script type="module" src="js/orders.js"></script>
    <script type="module" src="js/coupon.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/ui.js"></script>
    <script>
        // ── EmailJS config ── fill these 3 values after EmailJS setup ──
        const EMAILJS_PUBLIC_KEY  = "YOUR_PUBLIC_KEY";
        const EMAILJS_SERVICE_ID  = "YOUR_SERVICE_ID";
        const EMAILJS_TEMPLATE_ID = "YOUR_TEMPLATE_ID";
        // ────────────────────────────────────────────────────────────────

        (function initEmailJS() {
            if (typeof emailjs !== "undefined" && EMAILJS_PUBLIC_KEY !== "YOUR_PUBLIC_KEY") {
                emailjs.init({ publicKey: EMAILJS_PUBLIC_KEY });
            }
        })();

        async function sendInvoiceEmail({ userEmail, name, orderId, items, subtotal, delivery, discount, coupon, total, paymentMethod, address, mobile }) {
            if (typeof emailjs === "undefined" || EMAILJS_PUBLIC_KEY === "YOUR_PUBLIC_KEY") return;
            try {
                const orderDate = new Date().toLocaleDateString("en-GB", { day: "2-digit", month: "long", year: "numeric" });

                const itemsRows = items.map(item => {
                    const lineTotal = (item.price * item.quantity).toFixed(2);
                    const imgHtml = item.image
                        ? `<img src="${item.image}" width="48" height="48" style="object-fit:contain;border-radius:4px;border:1px solid #eee;vertical-align:middle;margin-right:8px">`
                        : "";
                    return `<tr style="border-bottom:1px solid #eee">
                        <td style="padding:.5rem .75rem">
                            ${imgHtml}
                            <strong>${item.name}</strong>
                            <span style="color:#888;font-size:.8rem;display:block;margin-top:2px">Size: ${item.size}</span>
                        </td>
                        <td style="padding:.5rem .75rem;text-align:center;font-weight:600">× ${item.quantity}</td>
                        <td style="padding:.5rem .75rem;text-align:right;font-weight:600">৳${lineTotal}</td>
                    </tr>`;
                }).join("");

                const discountRow = discount > 0
                    ? `<tr><td style="padding:.3rem 0;color:#1e7e34">Coupon${coupon ? " (" + coupon.id + ")" : ""}</td><td style="text-align:right;color:#1e7e34;font-weight:600">-৳${(+discount).toFixed(2)}</td></tr>`
                    : "";

                await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
                    to_email:       userEmail,
                    to_name:        name,
                    order_id:       orderId.slice(0, 8).toUpperCase(),
                    order_date:     orderDate,
                    items_rows:     itemsRows,
                    subtotal:       (+subtotal).toFixed(2),
                    delivery:       delivery,
                    discount_row:   discountRow,
                    total:          (+total).toFixed(2),
                    payment_method: paymentMethod,
                    address:        address,
                    mobile:         mobile,
                });
            } catch (err) {
                console.warn("Invoice email failed:", err);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderCheckoutCart();
            calculateTotal();
            if (window.zahrounGA && cart.length) {
                const sub = cart.reduce((s, i) => s + parseFloat(i.selectedPrice) * i.quantity, 0);
                window.zahrounGA.trackBeginCheckout(cart, sub);
            }
            togglePaymentDetails();

            const form = document.getElementById('checkout-form');
            form.addEventListener('submit', handleCheckout);
            form.addEventListener('input', checkFormValidity);
            form.addEventListener('change', checkFormValidity);
            checkFormValidity();

            // Coupon apply button
            document.getElementById('apply-coupon-btn').addEventListener('click', async () => {
                const btn = document.getElementById('apply-coupon-btn');
                const code = document.getElementById('coupon-code-input').value.trim();
                const fb = document.getElementById('coupon-feedback');
                if (!code) { fb.textContent = 'Enter a coupon code.'; fb.style.color = '#9b2226'; return; }
                btn.disabled = true; btn.textContent = 'Checking…';
                const subtotal = cart.reduce((s, i) => s + parseFloat(i.selectedPrice) * i.quantity, 0);
                try {
                    if (!window.validateAndApplyCoupon) { fb.textContent = 'Coupon system loading, try again.'; fb.style.color = '#9b2226'; return; }
                    const result = await window.validateAndApplyCoupon(code, subtotal);
                    fb.textContent = result.msg;
                    fb.style.color = result.valid ? '#1e7e34' : '#9b2226';
                    if (result.valid) calculateTotal();
                } catch (err) {
                    fb.textContent = 'Could not validate coupon. Try again.';
                    fb.style.color = '#9b2226';
                } finally {
                    btn.disabled = false; btn.textContent = 'Apply';
                }
            });

            // Clear coupon when code input is cleared
            document.getElementById('coupon-code-input').addEventListener('input', function() {
                if (!this.value.trim() && window.clearAppliedCoupon) {
                    window.clearAppliedCoupon();
                    document.getElementById('coupon-feedback').textContent = '';
                    calculateTotal();
                }
            });
        });

        function checkFormValidity() {
            const form = document.getElementById('checkout-form');
            const submitBtn = form.querySelector('button[type="submit"]');
            if (form.checkValidity()) {
                submitBtn.disabled = false;
                submitBtn.style.opacity = '1';
                submitBtn.style.cursor = 'pointer';
            } else {
                submitBtn.disabled = true;
                submitBtn.style.opacity = '0.5';
                submitBtn.style.cursor = 'not-allowed';
            }
        }

        function renderCheckoutCart() {
            const container = document.getElementById('checkout-cart-items');
            if (cart.length === 0) {
                container.innerHTML = '<p>Your cart is empty. Please add items before checking out.</p>';
                return;
            }

            container.innerHTML = cart.map(item => `
                <div class="order-summary-item">
                    <div style="display: flex; gap: 1rem;">
                        <img src="${item.image}" alt="${item.name}" style="width: 60px; height: 60px; object-fit: contain; border: 1px solid var(--border-color); border-radius: 4px;">
                        <div>
                            <h4 style="font-size: 1rem; margin-bottom: 0.25rem;">${item.name}</h4>
                            <div style="color: var(--text-muted); font-size: 0.8rem;">Size: ${item.size}</div>
                            <div style="color: var(--text-muted); font-size: 0.9rem;">Qty: ${item.quantity}</div>
                        </div>
                    </div>
                    <div style="font-weight: 600;">${(parseFloat(item.selectedPrice) * item.quantity).toFixed(2)} BDT</div>
                </div>
            `).join('');
        }

        function calculateTotal() {
            const subtotal = cart.reduce((sum, item) => sum + (parseFloat(item.selectedPrice) * item.quantity), 0);
            const deliverySelect = document.getElementById('deliveryArea');
            const deliveryCharge = parseInt(deliverySelect.value);

            const coupon = window.appliedCoupon || null;
            const discount = coupon ? (coupon.discount || 0) : 0;

            const total = (subtotal - discount) + deliveryCharge;

            document.getElementById('summary-subtotal').textContent = subtotal.toFixed(2) + ' BDT';

            const discountRow = document.getElementById('discount-row');
            if (discount > 0) {
                discountRow.style.display = 'flex';
                const label = coupon.type === 'percent' ? `Coupon (${coupon.value}% off)` : `Coupon discount`;
                document.getElementById('discount-label').textContent = label;
                document.getElementById('summary-discount').textContent = '-৳' + discount.toFixed(2);
            } else {
                discountRow.style.display = 'none';
            }

            document.getElementById('summary-delivery').textContent = deliveryCharge + ' BDT';
            document.getElementById('summary-total').textContent = total.toFixed(2) + ' BDT';
        }

        function togglePaymentDetails() {
            const paymentMethod = document.querySelector('input[name="payment"]:checked').value;
            const bkashDetails = document.getElementById('bkash-details');
            const nagadDetails = document.getElementById('nagad-details');
            const bkashTxn = document.getElementById('bkashTxn');
            const nagadTxn = document.getElementById('nagadTxn');

            bkashDetails.style.display = 'none';
            nagadDetails.style.display = 'none';
            bkashTxn.required = false;
            nagadTxn.required = false;

            if (paymentMethod === 'bKash') {
                bkashDetails.style.display = 'block';
                bkashTxn.required = true;
            } else if (paymentMethod === 'Nagad') {
                nagadDetails.style.display = 'block';
                nagadTxn.required = true;
            }
        }

        async function handleCheckout(e) {
            e.preventDefault();

            if (cart.length === 0) {
                alert('Your cart is empty! Add products to proceed.');
                return;
            }

            // Orders require a logged-in account (for order history + admin tracking).
            const user = window.getCurrentUser && window.getCurrentUser();
            if (!user) {
                if (window.showToast) window.showToast('Please log in to place your order', 'error');
                if (window.zahrounAuth) window.zahrounAuth.openModal();
                return;
            }

            // Stock validation — check current product stock before accepting order
            const allProducts = window.products || (window.ZahrounStore && window.ZahrounStore.products) || [];
            const stockErrors = [];
            for (const item of cart) {
                const prod = allProducts.find(p => Number(p.id) === Number(item.id));
                if (prod && prod.stock !== undefined && prod.stock !== null) {
                    if (prod.stock === 0) {
                        stockErrors.push('"' + item.name + '" is out of stock. Please remove it from your cart.');
                    } else if (prod.stock < item.quantity) {
                        stockErrors.push('"' + item.name + '": only ' + prod.stock + ' left in stock (you ordered ' + item.quantity + ').');
                    }
                }
            }
            if (stockErrors.length) {
                if (window.showToast) window.showToast(stockErrors[0], 'error');
                else alert(stockErrors[0]);
                return;
            }

            const name = document.getElementById('fullName').value;
            const mobile = document.getElementById('mobile').value;
            const address = document.getElementById('address').value;
            
            const deliverySelect = document.getElementById('deliveryArea');
            const deliveryAreaText = deliverySelect.options[deliverySelect.selectedIndex].text;
            const deliveryCharge = parseInt(deliverySelect.value);

            const paymentMethod = document.querySelector('input[name="payment"]:checked').value;
            let txnId = '';
            if (paymentMethod === 'bKash') txnId = document.getElementById('bkashTxn').value;
            if (paymentMethod === 'Nagad') txnId = document.getElementById('nagadTxn').value;

            const subtotal = cart.reduce((sum, item) => sum + (parseFloat(item.selectedPrice) * item.quantity), 0);
            const coupon = window.appliedCoupon || null;
            const discount = coupon ? (coupon.discount || 0) : 0;
            const total = (subtotal - discount) + deliveryCharge;

            // Build the order items snapshot
            const items = cart.map(item => ({
                id: item.id,
                name: item.name,
                size: item.size,
                price: parseFloat(item.selectedPrice),
                quantity: item.quantity,
                image: item.image || ''
            }));

            // WhatsApp notification message (offered after the order is saved)
            let itemList = '';
            cart.forEach(item => {
                itemList += `- ${item.name} (${item.size}) (x${item.quantity}) : ${(parseFloat(item.selectedPrice) * item.quantity).toFixed(2)} BDT\n`;
            });
            let message = `*New Order for Zahroun*\n------------------------\n*Customer Details:*\n`;
            message += `Name: ${name}\nMobile: ${mobile}\nAddress: ${address}\nDelivery Area: ${deliveryAreaText}\n\n`;
            message += `*Items:*\n${itemList}\nSubtotal: ${subtotal.toFixed(2)} BDT\n`;
            if (discount > 0 && coupon) message += `Coupon (${coupon.id}): -${discount.toFixed(2)} BDT\n`;
            message += `Delivery: ${deliveryCharge} BDT\n*Total:* ${total.toFixed(2)} BDT\n\n*Payment Method:* ${paymentMethod}\n`;
            if (txnId) message += `*Transaction ID:* ${txnId}\n`;
            const whatsappUrl = `https://wa.me/8801886936581?text=${encodeURIComponent(message)}`;

            // Save the order to Firestore
            const submitBtn = e.target.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Placing order...';
            try {
                const orderId = await window.saveOrder({
                    customer: { name, mobile, address, area: deliveryAreaText },
                    items,
                    subtotal: +subtotal.toFixed(2),
                    discount: +discount.toFixed(2),
                    couponCode: coupon ? coupon.id : null,
                    delivery: deliveryCharge,
                    total: +total.toFixed(2),
                    payment: { method: paymentMethod, txnId: txnId || null }
                });

                if (window.zahrounGA) window.zahrounGA.trackPurchase(orderId, items, total, coupon ? coupon.id : null);
                // Send invoice email to customer
                sendInvoiceEmail({
                    userEmail: user.email,
                    name, orderId, items, subtotal, delivery: deliveryCharge,
                    discount, coupon, total, paymentMethod, address, mobile
                });
                // Increment coupon usage counter if one was applied
                if (coupon && window.incrementCouponUsage) await window.incrementCouponUsage(coupon.id).catch(() => {});
                if (window.clearAppliedCoupon) window.clearAppliedCoupon();

                // Clear the cart
                localStorage.removeItem('zahroun_cart');
                cart = [];
                if (typeof updateCartUI === 'function') updateCartUI();

                // Success screen
                document.querySelector('.checkout-container').innerHTML = `
                    <div style="grid-column: 1 / -1; text-align: center; padding: 4rem 1rem;">
                        <ion-icon name="checkmark-circle" style="font-size: 4rem; color: #1e7e34;"></ion-icon>
                        <h2 style="margin: 1rem 0 0.5rem;">Order Placed!</h2>
                        <p style="color: var(--text-muted); margin-bottom: 0.4rem;">Your order <strong>#${orderId.slice(0,8).toUpperCase()}</strong> has been received.</p>
                        <p style="color: var(--text-muted); margin-bottom: 2rem;">We'll contact you on ${mobile} to confirm delivery.</p>
                        <div style="display:flex; gap:1rem; justify-content:center; flex-wrap:wrap;">
                            <a href="index.html" class="btn">Continue Shopping</a>
                            <a href="${whatsappUrl}" target="_blank" class="btn btn-outline" style="display:inline-flex;align-items:center;gap:.5rem;"><ion-icon name="logo-whatsapp"></ion-icon> Notify us on WhatsApp</a>
                        </div>
                    </div>`;
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } catch (err) {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Place Order';
                const msg = err.message === 'not-logged-in' ? 'Please log in to place your order' : ('Could not place order: ' + (err.code || err.message));
                if (window.showToast) window.showToast(msg, 'error'); else alert(msg);
            }
        }
    </script>
</body>
</html>
