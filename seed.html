<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Seeder | Zahroun Admin</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .seed-wrap { max-width: 720px; margin: 4rem auto; padding: 0 20px; }
        .seed-card { background: var(--surface-color); border: 1px solid var(--border-color);
            border-radius: 14px; padding: 2.5rem; box-shadow: var(--shadow-md); }
        #seed-log { background: var(--bg-color); border-radius: 8px; padding: 1rem;
            font-family: monospace; font-size: 0.85rem; white-space: pre-wrap;
            margin-top: 1.5rem; max-height: 320px; overflow-y: auto; }
        #seed-status { padding: 0.75rem 1rem; border-radius: 8px; margin-bottom: 1.5rem; font-size: 0.95rem; }
        .ok { background: #e6f4ea; color: #1e7e34; }
        .warn { background: #fdecea; color: #9b2226; }
        #login-btn { display:none; align-items:center; justify-content:center; gap:.6rem;
            width:100%; padding:.85rem; background:#fff; color:var(--text-main);
            border:1px solid var(--border-color); border-radius:8px; cursor:pointer;
            font-family:var(--font-sans); font-size:.98rem; margin-bottom:1rem; }
        #login-btn svg { width:18px; height:18px; }
    </style>
</head>
<body>
    <div class="seed-wrap">
        <div class="seed-card">
            <h1 style="color: var(--primary-color); font-size: 1.8rem; margin-bottom: 0.5rem;">Product Seeder</h1>
            <p style="color: var(--text-muted); margin-bottom: 1.5rem;">
                One-time tool: uploads the bundled perfumes into the Firestore
                <strong>products</strong> collection. Sign in as an admin and run it once.
            </p>
            <div id="seed-status" class="warn">Checking your access…</div>
            <button id="login-btn">
                <svg viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
                Sign in with Google
            </button>
            <button id="seed-btn" class="btn" style="width:100%;" disabled>Upload products to Firestore</button>
            <div id="seed-log" style="display:none;"></div>
            <p style="margin-top:1.5rem;"><a href="index.html" style="color:var(--primary-color);">&larr; Back to site</a></p>
        </div>
    </div>

    <script type="module">
        import { db, auth } from "./js/firebase-config.js";
        import { onAuthStateChanged, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { doc, setDoc, getDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        import { seedProducts } from "./js/products.js";

        const statusEl = document.getElementById("seed-status");
        const btn = document.getElementById("seed-btn");
        const loginBtn = document.getElementById("login-btn");
        const logEl = document.getElementById("seed-log");
        const log = (m) => { logEl.style.display = "block"; logEl.textContent += m + "\n"; logEl.scrollTop = logEl.scrollHeight; };
        const setStatus = (msg, ok) => { statusEl.textContent = msg; statusEl.className = ok ? "ok" : "warn"; };

        // Make sure the signed-in user has a profile document (so a role can be set).
        async function ensureProfile(user) {
            const ref = doc(db, "users", user.uid);
            const snap = await getDoc(ref);
            if (!snap.exists()) {
                await setDoc(ref, {
                    uid: user.uid, name: user.displayName || "", email: user.email || "",
                    role: "customer", blocked: false, createdAt: serverTimestamp()
                });
                return "customer";
            }
            return snap.data().role;
        }

        loginBtn.addEventListener("click", async () => {
            try { await signInWithPopup(auth, new GoogleAuthProvider()); }
            catch (e) { setStatus("Sign-in failed: " + (e.code || e.message), false); }
        });

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                setStatus("Please sign in to continue.", false);
                loginBtn.style.display = "flex";
                btn.disabled = true;
                return;
            }
            loginBtn.style.display = "none";
            try {
                const role = await ensureProfile(user);
                if (role === "admin") {
                    setStatus(`Signed in as admin (${user.email}). Ready to seed.`, true);
                    btn.disabled = false;
                } else {
                    setStatus(`Signed in as ${user.email} (role: ${role}). You are not an admin yet — in Firebase Console > Firestore > Data > users > your document, set "role" to "admin", then refresh this page.`, false);
                    btn.disabled = true;
                }
            } catch (e) {
                setStatus("Could not verify your role: " + (e.code || e.message), false);
            }
        });

        btn.addEventListener("click", async () => {
            btn.disabled = true;
            btn.textContent = "Uploading…";
            let done = 0;
            for (let i = 0; i < seedProducts.length; i++) {
                const p = seedProducts[i];
                try {
                    await setDoc(doc(db, "products", String(p.id)), {
                        ...p,
                        id: Number(p.id),
                        stock: typeof p.stock === "number" ? p.stock : 100,
                        featured: i < 4,
                        bestseller: i < 4,
                        newArrival: false,
                        hidden: false,
                        updatedAt: serverTimestamp()
                    }, { merge: true });
                    done++;
                    log(`✓ ${p.name} (id ${p.id})`);
                } catch (e) {
                    log(`✗ ${p.name}: ${e.code || e.message}`);
                }
            }
            setStatus(`Done. ${done}/${seedProducts.length} products uploaded to Firestore.`, done === seedProducts.length);
            btn.textContent = "Seed again";
            btn.disabled = false;
        });
    </script>
</body>
</html>
